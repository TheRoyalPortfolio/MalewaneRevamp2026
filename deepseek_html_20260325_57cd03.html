    if(document.getElementById('areaSelect') && document.getElementById('areaSelect').value) populatePanel(document.getElementById('areaSelect').value);

  const alertsRef = db.ref('alerts');
  alertsRef.on('value', (snapshot) => {
    const data = snapshot.val();
    if(data) alertItems = Object.values(data);
    else alertItems = [];
    renderAlerts();
  });
}

function seedDatabase(){
  const originalAreas = [...ORIG_SEED]; // ORIG_SEED defined from full original data (embedded)
  const areasRef = db.ref('areas');
  areasRef.set(originalAreas.reduce((acc,area)=>{ acc[area.id]=area; return acc; },{}));
  const defaultAlerts = [ /* original alerts from original file */ ];
  db.ref('alerts').set(defaultAlerts.reduce((acc,al)=>{ acc[al.id]=al; return acc; },{}));
}

// Write helpers (only when editMode active)
function writeArea(area){
  if(!editMode) return;
  db.ref(`areas/${area.id}`).set(area).catch(e=>toast("Sync error: "+e.message));
}
function deleteAreaFromFirebase(areaId){ if(editMode) db.ref(`areas/${areaId}`).remove().catch(e=>toast("Delete failed")); }
function writeAlert(alert){ if(editMode) db.ref(`alerts/${alert.id}`).set(alert); }
function deleteAlertFromFirebase(alertId){ if(editMode) db.ref(`alerts/${alertId}`).remove(); }

// Override all modification functions to use Firebase writes
window.setAreaField = (id, field, val) => {
  if(!editMode) return;
  const area = areas.find(a=>a.id===id);
  if(area){ area[field]=val; if(field==='adjEnd'){ const lastPhase=area.phases[area.phases.length-1]; if(lastPhase) lastPhase.ad=val; } writeArea(area); toast(`✓ ${area.name} updated`); }
};
window.setPhaseDate = (id, idx, val) => {
  if(!editMode) return;
  const area = areas.find(a=>a.id===id);
  area.phases[idx].ad=val;
  const maxDate = area.phases.reduce((m,p)=>new Date(p.ad)>new Date(m)?p.ad:m, area.phases[0].ad);
  area.adjEnd = maxDate;
  writeArea(area);
  toast(`Phase date updated & re-sorted`);
};
window.setPhaseName = (id, idx, val) => { if(editMode){ areas.find(a=>a.id===id).phases[idx].n=val; writeArea(areas.find(a=>a.id===id)); } };
window.setPhaseStatus = (id, idx, val) => { if(editMode){ areas.find(a=>a.id===id).phases[idx].s=val; writeArea(areas.find(a=>a.id===id)); toast("Status changed"); } };
window.removePhase = (areaId, idx) => {
  if(!editMode) return;
  const area = areas.find(a=>a.id===areaId);
  if(area.phases.length<=1){ toast("Cannot remove last phase"); return; }
  openConfirm("Remove Task", `Delete "${area.phases[idx].n}"?`, ()=>{
    area.phases.splice(idx,1);
    const maxDate = area.phases.reduce((m,p)=>new Date(p.ad)>new Date(m)?p.ad:m, area.phases[0].ad);
    area.adjEnd = maxDate;
    writeArea(area);
    toast("Task removed");
  });
};
window.deleteArea = (areaId) => {
  openConfirm("Remove Area", `Permanently delete ${areas.find(a=>a.id===areaId).name}?`, ()=>{
    deleteAreaFromFirebase(areaId);
    toast("Area deleted");
  });
};
window.addPhaseViaModal = (areaId, name, sched, adj, status) => {
  if(!editMode) return;
  const area = areas.find(a=>a.id===areaId);
  area.phases.push({n:name, s:status, sd:sched||adj, ad:adj});
  const maxDate = area.phases.reduce((m,p)=>new Date(p.ad)>new Date(m)?p.ad:m, area.phases[0].ad);
  area.adjEnd = maxDate;
  writeArea(area);
};
window.addArea = (newAreaObj) => { if(editMode) db.ref(`areas/${newAreaObj.id}`).set(newAreaObj); };
window.updateAlert = (alert) => { if(editMode) writeAlert(alert); };
window.deleteAlertItem = (id) => { if(editMode) deleteAlertFromFirebase(id); };

// Auth and Edit Mode
function lockEditor(){ editMode=false; document.body.classList.remove('edit-mode'); document.getElementById('editBanner').classList.remove('show'); document.getElementById('toggleEdit').classList.remove('active'); document.getElementById('editPanel').classList.remove('open'); }
function activateEditMode(){ editMode=true; document.body.classList.add('edit-mode'); document.getElementById('editBanner').classList.add('show'); document.getElementById('toggleEdit').classList.add('active'); document.getElementById('editPanel').classList.add('open'); if(areas.length) populatePanel(areas[0].id); }
document.getElementById('toggleEdit').onclick=()=>{ if(editMode) lockEditor(); else if(authenticated) activateEditMode(); else document.getElementById('pwOverlay').classList.add('show'); };
document.getElementById('pwSubmit').onclick=()=>{ const val=document.getElementById('pwInput').value; if(hashPw(val)===PW_HASH){ authenticated=true; document.getElementById('pwOverlay').classList.remove('show'); activateEditMode(); toast("Editor unlocked"); } else { document.getElementById('pwError').textContent="Incorrect password"; } };
document.getElementById('closePanel').onclick=lockEditor;
